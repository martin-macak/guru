name: Enhancement
description: Suggest a new feature or improvement to Guru
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please provide as much context as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Guru would this enhancement affect?
      options:
        - guru-server
        - guru-mcp
        - guru-cli / TUI
        - guru-core
        - guru-graph
        - Documentation
        - CI / Tooling
        - Other / New Component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: >
        Is your feature request related to a problem? Describe the pain point or motivation.
        E.g. "I'm always frustrated when …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, references, or related issues.
    validations:
      required: false
