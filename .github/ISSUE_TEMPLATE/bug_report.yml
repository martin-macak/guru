name: Bug Report
description: Report a bug or unexpected behaviour in Guru
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below so we can investigate.

  - type: input
    id: version
    attributes:
      label: Version
      description: >
        The Guru version where you observed the bug.
        Run `uv run guru --version` or check the output of `dunamai from git` to get the version.
        Must follow semver (e.g. `0.3.1`, `1.0.0`, `2.1.0-alpha.1`).
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Guru is affected?
      options:
        - guru-server
        - guru-mcp
        - guru-cli / TUI
        - guru-core
        - guru-graph
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps needed to reproduce the issue.
      placeholder: |
        1. Run `guru init` in an empty directory
        2. Run `guru ingest docs/`
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages, stack traces, or logs.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        OS, Python version, and any other relevant environment details.
      placeholder: |
        - OS: macOS 14.4
        - Python: 3.12.3
        - Ollama: 0.3.6
        - Neo4j: 5.20 (if applicable)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or related issues.
    validations:
      required: false
