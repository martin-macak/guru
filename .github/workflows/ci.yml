name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — per-package, only if that package changed
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      guru-core: ${{ steps.filter.outputs.guru-core }}
      guru-server: ${{ steps.filter.outputs.guru-server }}
      guru-mcp: ${{ steps.filter.outputs.guru-mcp }}
      guru-cli: ${{ steps.filter.outputs.guru-cli }}
      guru-graph: ${{ steps.filter.outputs.guru-graph }}
      guru-web: ${{ steps.filter.outputs.guru-web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            guru-core:
              - 'packages/guru-core/**'
            guru-server:
              - 'packages/guru-server/**'
            guru-mcp:
              - 'packages/guru-mcp/**'
            guru-cli:
              - 'packages/guru-cli/**'
            guru-graph:
              - 'packages/guru-graph/**'
            guru-web:
              - 'packages/guru-web/**'

  unit-tests:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: guru-core
            changed: ${{ needs.detect-changes.outputs.guru-core }}
          - package: guru-server
            changed: ${{ needs.detect-changes.outputs.guru-server }}
          - package: guru-mcp
            changed: ${{ needs.detect-changes.outputs.guru-mcp }}
          - package: guru-cli
            changed: ${{ needs.detect-changes.outputs.guru-cli }}
          - package: guru-graph
            changed: ${{ needs.detect-changes.outputs.guru-graph }}
    if: >-
      needs.detect-changes.outputs.guru-core == 'true' ||
      needs.detect-changes.outputs.guru-server == 'true' ||
      needs.detect-changes.outputs.guru-mcp == 'true' ||
      needs.detect-changes.outputs.guru-cli == 'true' ||
      needs.detect-changes.outputs.guru-graph == 'true'
    steps:
      - if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - if: matrix.changed == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - if: matrix.changed == 'true'
        run: uv sync --all-packages

      - if: matrix.changed == 'true'
        run: uv run pytest packages/${{ matrix.package }}/ -v --tb=short

    name: test (${{ matrix.package }})

  # ---------------------------------------------------------------------------
  # E2E tests — only when label "require-e2e-tests" is set
  # ---------------------------------------------------------------------------
  e2e-tests:
    if: contains(github.event.pull_request.labels.*.name, 'require-e2e-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull nomic-embed-text

      - run: uv sync --all-packages

      - name: Run BDD e2e tests
        run: uv run behave tests/e2e/features/

  # ---------------------------------------------------------------------------
  # Graph plugin tests — only when label "require-e2e-tests" is set
  # ---------------------------------------------------------------------------
  graph-plugin:
    if: contains(github.event.pull_request.labels.*.name, 'require-e2e-tests')
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: none
        options: >-
          --health-cmd "cypher-shell 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - run: uv sync --all-packages

      - name: Run guru-graph tests (including @real_neo4j)
        env:
          GURU_REAL_NEO4J: "1"
          # Point Neo4jBackend at the service container instead of spawning a
          # local neo4j process (which is not installed on the runner).
          GURU_NEO4J_BOLT_URI: "bolt://localhost:7687"
        timeout-minutes: 5
        run: uv run pytest packages/guru-graph/ -v --tb=short --timeout=60

      - name: Run graph BDD scenarios
        env:
          GURU_REAL_NEO4J: "1"
          GURU_NEO4J_BOLT_URI: "bolt://localhost:7687"
        timeout-minutes: 5
        run: |
          uv run behave tests/e2e/features/graph_plugin.feature
          uv run behave tests/e2e/features/graph_cli_reads.feature

  # ---------------------------------------------------------------------------
  # Web GUI — fast checks (typecheck + unit tests)
  # Runs whenever packages/guru-web/** changes
  # ---------------------------------------------------------------------------
  web-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.guru-web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/guru-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/guru-web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Web GUI — slow build (production Vite build)
  # On-demand: add label "require-web-build" to trigger
  # ---------------------------------------------------------------------------
  web-build:
    if: contains(github.event.pull_request.labels.*.name, 'require-web-build')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/guru-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/guru-web/package-lock.json

      - run: npm ci

      - name: Production build
        run: npx vite build
