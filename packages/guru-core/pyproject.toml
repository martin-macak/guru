[project]
name = "guru-core"
version = "0.1.0"
description = "Guru shared client SDK and types"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.28",
]

[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
