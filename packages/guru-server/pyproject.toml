[project]
name = "guru-server"
dynamic = ["version", "dependencies"]
description = "Guru FastAPI server — owns all state (LanceDB, Ollama, ingestion)"
readme = "README.md"
authors = [
    { name = "Martin Macak", email = "martin.macak@gmail.com" }
]
requires-python = ">=3.13"

[project.scripts]
guru-server = "guru_server.main:main"
guru-server-dev = "guru_server.dev:main"

[tool.uv.sources]
guru-core = { workspace = true }

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "guru-core=={{ version }}",
    "httpx>=0.28",
    "pydantic>=2.0",
    "llama-index-core>=0.14",
    "python-frontmatter>=1.1",
    "lancedb>=0.27",
    "pandas>=2.0",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "watchfiles>=1.0",
    "platformdirs>=4.0",
    "numpy>=1.26",
    "tree-sitter>=0.22,<0.24",
    "tree-sitter-python>=0.21,<0.24",
    "PyYAML>=6.0",
]

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]
