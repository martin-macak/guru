[project]
name = "guru-cli"
version = "0.1.0"
description = "Guru CLI and TUI"
readme = "README.md"
authors = [
    { name = "Martin Macak", email = "martin.macak@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "guru-core",
    "click>=8.1",
]

[project.scripts]
guru = "guru_cli.cli:cli"

[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
guru-core = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
